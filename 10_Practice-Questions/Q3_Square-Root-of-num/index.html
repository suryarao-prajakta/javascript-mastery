<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Root of number</title>
</head>
<body>
    <script type="text/javascript">
        var x = prompt("Enter a nunber to find its square root:");

        console.log("The square root of " + x + "is: " + y);
    </script>
