<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conver Kilometers To Miles</title>
    <script type="text/javascript">
        function convert() {
            let kms = document.getElementById("data").value;
            const factor= 0.621371;
            let miles = kms * factor;
            // document.getElementById('res').innerText = `{$miles} miles`;
            document.getElementById('res').innerText = miles + 'miles';
        }
    </script>
</head>
<body>
    <input type="number" id="data" step="any"> Kms
    <button onclick="convert()">convert</button> miles 
    <h1 id="res"></h1>
</body>
</html>
